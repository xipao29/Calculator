<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <link rel="icon" href="Calculator_Icon.ico" type="x-icon">
    <title>Calculator</title>
</head>
<body>

    <div id="Centered">
        <div id="Buttons_Background">
            <div id="Table"><p id="Numbers">0</p></div>
            <div id="Buttons">
                <button id="Clear_Button" class="Button">C</button>
                <button id="Plus_Button" class="Button">+</button>
                <button id="Minus_Button" class="Button">-</button>
                <button id="Equal_Button" class="Button">=</button>
                <button id="Seven_Button" class="Button">7</button>
                <button id="Eight_Button" class="Button">8</button>
                <button id="Nine_Button" class="Button">9</button>
                <button id="Multiplication_Button" class="Button">x</button>
                <button id="Four_Button" class="Button">4</button>
                <button id="Five_Button" class="Button">5</button>
                <button id="Six_Button" class="Button">6</button>
                <button id="Division_Button" class="Button">÷</button>
                <button id="One_Button" class="Button">1</button>
                <button id="Two_Button" class="Button">2</button>
                <button id="Three_Button" class="Button">3</button>
                <button id="Exponentiation_Button" class="Button">*</button>
                <button id="Zero_Button" class="Button">0</button>
            </div>
        </div>
    </div>
    
    <script src="Scripts.js"></script>

</body>
</html>
